services:
  - type: web
    name: vetfinder-api
    env: docker
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_BUCKET
        value: vetfinder-documents
      - key: PAYMENT_PROVIDER
        value: sandbox-split
      - key: PLATFORM_FEE_RATE
        value: "0.03"
