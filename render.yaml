services:
  - type: web
    name: vetfinder-api
    env: docker
    plan: free
    healthCheckPath: /v1/health
    envVars:
      - key: NODE_ENV
        value: production
      - key: DATABASE_URL
        sync: false
      - key: JWT_ACCESS_SECRET
        sync: false
      - key: JWT_REFRESH_SECRET
        sync: false
      - key: CORS_ORIGINS
        sync: false
      - key: STORAGE_DRIVER
        value: local
      - key: STORAGE_BUCKET
        sync: false
      - key: S3_ENDPOINT
        sync: false
      - key: S3_REGION
        value: auto
      - key: S3_ACCESS_KEY_ID
        sync: false
      - key: S3_SECRET_ACCESS_KEY
        sync: false
      - key: S3_FORCE_PATH_STYLE
        value: "false"
      - key: PAYMENT_PROVIDER
        value: sandbox-split
      - key: PLATFORM_FEE_RATE
        value: "0.03"
